services:
  app:
    image: ${RESUME_TAILOR_IMAGE:-${RESUME_MAKE_IMAGE:-qrqr/resume-tailor:latest}}
    container_name: resume-tailor-app
    environment:
      CODEX_HOME: /root/.codex
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: "${APP_PORT:-3000}"
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    stdin_open: true
    tty: true
    volumes:
      - codex-home:/root/.codex

volumes:
  codex-home:

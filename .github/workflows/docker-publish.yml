name: Publish Docker Image

on:
  push:
    branches:
      - main
    # Docker 이미지에 영향 있는 파일이 바뀔 때만 실행한다.
    # 문서-only 변경은 새 run을 만들지 않으므로, 진행 중인 기존 run도 그대로 유지된다.
    paths:
      - "app/**"
      - "lib/**"
      - "public/**"
      - "skills/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.mjs"
      - "eslint.config.mjs"
      - "vitest.config.ts"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

concurrency:
  # 같은 브랜치에서 이 워크플로의 새 run이 시작되면 이전 run을 취소한다.
  # 새 run이 생기지 않는 문서-only push는 기존 run을 취소하지 않는다.
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME || 'qrqr' }}
  DOCKER_IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'qrqr/resume-tailor' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      verify: ${{ steps.filter.outputs.verify }}
      publish: ${{ steps.filter.outputs.publish }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            # verify는 테스트/설정 변경도 포함해 넓게 잡고,
            # publish는 실제 이미지 결과물이 달라지는 변경만 포함한다.
            verify:
              - "app/**"
              - "lib/**"
              - "public/**"
              - "skills/**"
              - "scripts/**"
              - "tests/**"
              - "package.json"
              - "package-lock.json"
              - "tsconfig.json"
              - "next.config.mjs"
              - "eslint.config.mjs"
              - "vitest.config.ts"
              - "Dockerfile"
              - ".dockerignore"
              - ".github/workflows/docker-publish.yml"
            publish:
              - "app/**"
              - "lib/**"
              - "public/**"
              - "skills/**"
              - "scripts/**"
              - "package.json"
              - "package-lock.json"
              - "tsconfig.json"
              - "next.config.mjs"
              - "Dockerfile"
              - ".dockerignore"
              - ".github/workflows/docker-publish.yml"

  verify:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.verify == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  publish:
    needs:
      - changes
      - verify
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.publish == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-publish
          cache-to: type=gha,mode=max,scope=docker-publish
          provenance: false
